name: Watch Listing Monitor

on:
  schedule:
    - cron: "30 12 * * *"  # 7:30 AM EST (UTC-5) every day
  workflow_dispatch:        # "Run workflow" button in GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (Chromium for Bezel)
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python scraper.py
